{% extends "base.html" %}

{% block title %}Carte{% endblock %}

{% block content %}
<div class="max-w-7xl mx-auto p-6">

    <div class="mb-6">
        <h1 class="text-3xl font-bold text-brown">
            Carte des prix immobiliers par commune<span class="text-sage">.</span>
        </h1>
        <p class="text-gray-400 text-sm italic">
            Visualisation interactive des données immobilières
        </p>
    </div>

    <div id="map" class="w-full h-[600px] rounded-2xl shadow-sm border border-gray-100"></div>

</div>

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
    // Initialiser la carte centrée sur la France
    const map = L.map('map').setView([46.6, 2.5], 6);

    // Ajouter fond de carte OpenStreetMap
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    // Charger les données GeoJSON depuis Django
    fetch("{% url 'api_real_estate_by_commune' %}") // remplace par ton endpoint Django si besoin
        .then(res => res.json())
        .then(communesData => {

            // Fonction pour choisir la couleur selon le prix/m²
            function getColor(prix_m2) {
                return prix_m2 > 5000 ? '#800026' :
                       prix_m2 > 3000 ? '#BD0026' :
                       prix_m2 > 2000 ? '#E31A1C' :
                       prix_m2 > 1500 ? '#FC4E2A' :
                       prix_m2 > 1000 ? '#FD8D3C' :
                       prix_m2 > 500  ? '#FEB24C' :
                                        '#FFEDA0';
            }

            // Ajouter chaque commune en GeoJSON
            communesData.forEach(commune => {
                if (!commune.geojson) return; // s'il n'y a pas de géométrie

                const geoLayer = L.geoJSON(JSON.parse(commune.geojson), {
                    style: {
                        fillColor: getColor(commune.prix_m2),
                        weight: 1,
                        color: '#555',
                        fillOpacity: 0.7
                    }
                }).addTo(map);

                const popupContent = `
                    <b>Code commune:</b> ${commune.code_commune}<br>
                    <b>Année:</b> ${commune.annee}<br>
                    <b>Prix/m²:</b> ${commune.prix_m2} €<br>
                    <b>Surface moyenne:</b> ${commune.surface_reelle_bati} m²<br>
                    <b>Nb ventes:</b> ${commune.nb_ventes}
                `;

                geoLayer.bindPopup(popupContent);
            });
        })
        .catch(err => console.error("Erreur chargement GeoJSON :", err));
</script>
{% endblock %}
